schema: spec-driven

context: |
  Tech stack: PHP 8.4, Laravel 13.11.2, PostgreSQL.
  Architecture: default Laravel skeleton; route closure at routes/web.php; no custom domain modules yet.
  Testing: Pest 4 with PHPUnit 12; tests/Unit and tests/Feature exist; no E2E runner detected.
  Style: Laravel Boost guidelines, project AGENTS.md, Pint formatter, named routes, and existing User model attributes.

strict_tdd: true

testing:
  detected: 2026-05-20
  runner:
    command: php artisan test --compact
    framework: Pest 4 / PHPUnit 12
  layers:
    unit:
      available: true
      tool: Pest
    feature:
      available: true
      tool: Pest + Laravel HTTP testing
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: true
      command: vendor/bin/pint --dirty --format agent
    type_checker:
      available: false
      command: null
    formatter:
      available: true
      command: vendor/bin/pint --dirty --format agent

rules:
  proposal:
    - Include rollback notes for risky changes.
  specs:
    - Use Given/When/Then scenarios and RFC 2119 keywords.
  design:
    - Document rationale for architectural decisions.
  tasks:
    - Group by phase and keep items small.
  apply:
    tdd: true
    test_command: php artisan test --compact
  verify:
    test_command: php artisan test --compact
    build_command: npm run build
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas.
